<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="robots" content="noindex, nofollow" />
<title>Check-in</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
:root{
  --cream:#F4EFE3;--ink:#1A1A1A;--ink-soft:#4C4843;--ink-faint:#8A857B;
  --blue:#4FC1E9;--blue-deep:#2BAEDE;--green:#3BB98C;
  --glass-bg:rgba(255,255,255,0.82);--glass-border:rgba(255,255,255,0.85);--glass-blur:14px;
  --radius:26px;--display:'Newsreader',Georgia,serif;--body:'Hanken Grotesk',system-ui,sans-serif;
  --shadow:0 22px 50px -22px rgba(26,26,26,0.20);--shadow-soft:0 10px 26px -14px rgba(26,26,26,0.16);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{font-family:var(--body);color:var(--ink);background:var(--cream);overflow-x:hidden;min-height:100vh;position:relative;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
.ambient{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
.blob{position:absolute;border-radius:50%;filter:blur(110px);opacity:0.5;}
.blob.b1{width:40vmax;height:40vmax;background:radial-gradient(circle at 30% 30%,#BFE9F7,transparent 72%);top:-18vmax;left:-14vmax;opacity:0.42;}
.blob.b2{width:38vmax;height:38vmax;background:radial-gradient(circle at 50% 50%,#FBE9A8,transparent 72%);bottom:-18vmax;right:-12vmax;opacity:0.45;}
.blob.b3{width:26vmax;height:26vmax;background:radial-gradient(circle at 50% 50%,#D8F2FB,transparent 72%);top:42%;right:14%;opacity:0.24;}
.app{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:22px 16px 40px;min-height:100vh;}
.app-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:16px;}
.greet{min-width:0;}
.greet .kick{font-weight:700;font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:var(--blue-deep);margin-bottom:3px;}
.greet h1{font-family:var(--display);font-weight:600;font-size:26px;line-height:1.05;letter-spacing:-0.01em;}
.avatar{width:44px;height:44px;border-radius:50%;flex:0 0 auto;background:linear-gradient(140deg,#6FD0EE,#2BAEDE);color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:600;font-size:18px;box-shadow:var(--shadow-soft);border:2px solid rgba(255,255,255,0.8);}
.stack{display:flex;flex-direction:column;gap:14px;}
.card{background:var(--glass-bg);backdrop-filter:blur(var(--glass-blur)) saturate(150%);-webkit-backdrop-filter:blur(var(--glass-blur)) saturate(150%);border:1px solid var(--glass-border);border-radius:var(--radius);box-shadow:var(--shadow-soft);padding:18px;position:relative;}
.card.feature{box-shadow:var(--shadow);}
.pulse-hero{overflow:hidden;}
.ph-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px;flex-wrap:wrap;}
.tag{display:inline-flex;align-items:center;gap:7px;font-weight:700;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;padding:6px 11px;border-radius:99px;}
.tag.due{background:rgba(243,210,78,0.30);color:#A9821B;}
.tag.done{background:rgba(59,185,140,0.18);color:#2A8A66;}
.tag .d{width:7px;height:7px;border-radius:50%;background:currentColor;}
.streak{display:flex;align-items:center;gap:8px;font-weight:700;font-size:13px;color:var(--ink-soft);white-space:nowrap;}
.streak .flame{width:26px;height:26px;border-radius:8px;background:rgba(243,210,78,0.35);display:flex;align-items:center;justify-content:center;color:#A9821B;font-weight:800;font-size:13px;}
.pulse-hero h2{font-family:var(--display);font-weight:600;font-size:24px;line-height:1.12;letter-spacing:-0.01em;margin-bottom:6px;}
.pulse-hero p{font-size:14px;line-height:1.5;color:var(--ink-soft);margin-bottom:16px;}
.btn{font-family:var(--body);font-weight:700;font-size:15px;border:none;cursor:pointer;border-radius:99px;padding:14px 20px;display:inline-flex;align-items:center;gap:9px;justify-content:center;transition:transform .15s ease,box-shadow .25s ease,background .2s;}
.btn-primary{background:var(--blue);color:#fff;box-shadow:0 10px 22px -8px rgba(43,174,222,0.7);}
.btn-primary:hover{background:var(--blue-deep);transform:translateY(-2px);}
.btn-primary:disabled{opacity:.6;cursor:default;transform:none;}
.btn-ghost{background:rgba(255,255,255,0.6);color:var(--ink);border:1px solid var(--glass-border);}
.btn-ghost:hover{background:#fff;}
.btn.full{width:100%;}
.btn .arrow{transition:transform .2s;}.btn:hover .arrow{transform:translateX(3px);}
.gatewrap{min-height:82vh;display:flex;align-items:center;justify-content:center;}
.lock-card{max-width:380px;width:100%;text-align:center;}
.lock-badge{width:52px;height:52px;border-radius:50%;margin:0 auto 14px;background:rgba(79,193,233,0.15);display:flex;align-items:center;justify-content:center;}
.lock-title{font-family:var(--display);font-weight:600;font-size:24px;letter-spacing:-0.01em;margin-bottom:6px;}
.lock-sub{font-size:14px;color:var(--ink-soft);margin-bottom:18px;}
.pc-input{width:100%;border:1px solid var(--glass-border);background:rgba(255,255,255,0.7);border-radius:16px;padding:14px 16px;font-family:var(--body);font-weight:700;font-size:20px;letter-spacing:0.16em;text-align:center;text-transform:uppercase;color:var(--ink);margin-bottom:12px;outline:none;}
.pc-input:focus{border-color:var(--blue);background:#fff;}
.pc-err{color:#B83E29;font-size:13px;font-weight:600;margin-bottom:12px;}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.stat{background:var(--glass-bg);border:1px solid var(--glass-border);border-radius:18px;padding:12px 8px;text-align:center;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);}
.stat .v{font-family:var(--display);font-weight:600;font-size:22px;line-height:1;white-space:nowrap;}
.stat .v small{font-size:12px;color:var(--ink-faint);}
.stat .l{font-size:11px;font-weight:600;color:var(--ink-faint);margin-top:6px;letter-spacing:0.02em;}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.card-head .ct{font-weight:700;font-size:13px;letter-spacing:0.06em;text-transform:uppercase;color:var(--ink-faint);}
.trend-now{display:flex;align-items:flex-end;justify-content:space-between;gap:10px;margin-bottom:4px;flex-wrap:wrap;}
.trend-now .big{font-family:var(--display);font-weight:600;font-size:32px;line-height:1;}
.trend-now .big small{font-size:15px;color:var(--ink-faint);}
.delta{font-weight:700;font-size:13px;display:inline-flex;align-items:center;gap:4px;padding:4px 9px;border-radius:99px;}
.delta.up{background:rgba(59,185,140,0.16);color:#2A8A66;}
.delta.down{background:rgba(201,138,30,0.16);color:#A9821B;}
.chart{width:100%;display:block;}
.axis-row{display:flex;justify-content:space-between;font-size:11px;font-weight:600;color:var(--ink-faint);margin-top:8px;padding:0 2px;}
.screen-sub{font-size:14px;color:var(--ink-soft);line-height:1.5;}
.gate{display:inline-flex;align-items:center;gap:8px;font-weight:800;font-size:12.5px;letter-spacing:0.07em;text-transform:uppercase;padding:8px 14px;border-radius:99px;margin-bottom:12px;}
.gate .d{width:9px;height:9px;border-radius:50%;background:currentColor;}
.gate.green{background:rgba(59,185,140,0.18);color:#2A8A66;}
.gate.amber{background:rgba(217,154,40,0.20);color:#A9701B;}
.gate.red{background:rgba(214,96,74,0.16);color:#B83E29;}
.gate-note{font-size:14px;line-height:1.5;color:var(--ink-soft);margin-bottom:16px;}
.sub-row{display:grid;grid-template-columns:1fr auto;gap:5px 10px;align-items:center;margin-top:14px;}
.sub-row:first-of-type{margin-top:0;}
.sub-row .sn{font-weight:700;font-size:14px;}
.sub-row .sv{font-family:var(--display);font-weight:600;font-size:16px;color:var(--ink-soft);font-variant-numeric:tabular-nums;}
.sub-row .track{grid-column:1/3;height:8px;border-radius:99px;background:rgba(26,26,26,0.08);overflow:hidden;}
.sub-row .track i{display:block;height:100%;border-radius:99px;}
.bar-green{background:linear-gradient(90deg,#5FD3A2,#3BB98C);}
.bar-amber{background:linear-gradient(90deg,#F0C45A,#D99A28);}
.bar-red{background:linear-gradient(90deg,#E78A77,#D6604A);}
.group-label{font-weight:700;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--blue-deep);margin:4px 0 12px;}
.dom-list{display:flex;flex-direction:column;gap:13px;}
.dom{display:grid;grid-template-columns:1fr auto;gap:4px 10px;align-items:center;}
.dom .dn{font-weight:600;font-size:13.5px;}
.dom .dv{font-family:var(--display);font-weight:600;font-size:15px;color:var(--ink-soft);font-variant-numeric:tabular-nums;}
.dom .track{grid-column:1/3;height:7px;border-radius:99px;background:rgba(26,26,26,0.08);overflow:hidden;}
.dom .track i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--blue),var(--blue-deep));}
.checkin-top{display:flex;align-items:center;gap:14px;margin-bottom:8px;}
.icon-btn{width:42px;height:42px;border-radius:50%;border:1px solid var(--glass-border);background:rgba(255,255,255,0.6);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink);flex:0 0 auto;}
.icon-btn:hover{background:#fff;}
.ci-progress{flex:1;height:7px;border-radius:99px;background:rgba(26,26,26,0.08);overflow:hidden;}
.ci-progress i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--blue),var(--blue-deep));transition:width .4s cubic-bezier(.22,1,.36,1);width:0;}
.ci-card{margin-top:18px;}
.slider-q{padding:6px 2px 2px;}
.slider-q .sq-section{font-weight:700;font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:6px;}
.slider-q .sq-num{font-weight:700;font-size:12px;letter-spacing:0.12em;text-transform:uppercase;color:var(--blue-deep);margin-bottom:10px;}
.slider-q h2{font-family:var(--display);font-weight:600;font-size:26px;line-height:1.14;letter-spacing:-0.015em;margin-bottom:8px;}
.slider-q .sq-help{font-size:14.5px;color:var(--ink-soft);line-height:1.5;margin-bottom:24px;}
.val-display{text-align:center;margin-bottom:6px;}
.val-display .vd-num{font-family:var(--display);font-weight:600;font-size:66px;line-height:1;letter-spacing:-0.03em;}
.val-display .vd-num small{font-size:24px;color:var(--ink-faint);}
.val-display .vd-word{font-weight:700;font-size:14px;color:var(--blue-deep);margin-top:2px;height:18px;}
.range-wrap{padding:10px 4px 4px;}
input[type=range].brange{-webkit-appearance:none;appearance:none;width:100%;height:10px;border-radius:99px;background:linear-gradient(90deg,var(--blue) 0%,var(--blue) var(--pct,50%),rgba(26,26,26,0.10) var(--pct,50%),rgba(26,26,26,0.10) 100%);outline:none;cursor:pointer;}
input[type=range].brange::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:34px;height:34px;border-radius:50%;background:#fff;border:3px solid var(--blue);box-shadow:0 6px 16px -4px rgba(43,174,222,0.7);cursor:grab;}
input[type=range].brange::-moz-range-thumb{width:34px;height:34px;border-radius:50%;background:#fff;border:3px solid var(--blue);box-shadow:0 6px 16px -4px rgba(43,174,222,0.7);cursor:grab;}
.range-ends{display:flex;justify-content:space-between;font-size:12px;font-weight:600;color:var(--ink-faint);margin-top:12px;padding:0 2px;gap:12px;}
.range-ends span{max-width:46%;}.range-ends span:last-child{text-align:right;}
.ci-nav{display:flex;gap:12px;margin-top:28px;}
.ci-nav .btn{flex:1;}
.ci-done{text-align:center;padding:10px 4px;}
.ci-done .check{width:74px;height:74px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;margin:6px auto 22px;box-shadow:0 14px 30px -10px rgba(59,185,140,0.7);}
.ci-done h2{font-family:var(--display);font-weight:600;font-size:32px;letter-spacing:-0.02em;margin-bottom:10px;}
.ci-done p{font-size:15px;line-height:1.55;color:var(--ink-soft);margin-bottom:6px;}
.ci-done .pulse-num{font-family:var(--display);font-weight:600;font-size:20px;color:var(--ink);}
.screen{animation:rise .45s cubic-bezier(.22,1,.36,1);}
@keyframes rise{from{transform:translateY(12px);opacity:.6;}to{transform:none;opacity:1;}}
@media (max-width:380px){.app{padding:18px 12px 32px;}.greet h1{font-size:24px;}.pulse-hero h2{font-size:22px;}.slider-q h2{font-size:23px;}}
</style>
</head>
<body>
<div class="ambient" aria-hidden="true"><div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div></div>
<main class="app" id="app"></main>
<script>
(function(){
  "use strict";
  var FN = "https://pldcachbsnslroybflyu.supabase.co/functions/v1";
  var slug = (location.pathname.replace(/^\/assess\/?/i,"").replace(/\/+$/,"") || "").toLowerCase();
  if(!slug){ var qm=location.search.match(/[?&]c=([^&]+)/); if(qm) slug=decodeURIComponent(qm[1]).toLowerCase(); }
  var state = { token:null, name:"", config:null, responses:[] };
  var view = "passcode", ciIndex = 0, answers = {}, busy = false, errMsg = "";
  var GATE = {
    green:{t:"Ready to approach",n:"You can touch a charged event this week, in small paced doses."},
    amber:{t:"Work the edges",n:"Build the lowest signals with small reps. Ease toward the edges, no full deconstruction yet."},
    red:{t:"Stabilize first",n:"Stay with safety and grounding this week. No charged work yet."}
  };

  function root(){ return document.getElementById("app"); }
  function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c];}); }
  function daysSince(iso){ return Math.floor((Date.now()-new Date(iso).getTime())/864e5); }
  function lastResp(){ return state.responses[state.responses.length-1]; }
  function isDue(){ var l=lastResp(); return !l || daysSince(l.submitted_at)>=7; }
  function greeting(){ var h=new Date().getHours(); return h<12?"Morning":h<18?"Afternoon":"Evening"; }
  function wordFor(v){ if(v<=2)return"Very low";if(v<=4)return"Low";if(v===5)return"Middling";if(v<=7)return"Good";if(v<=9)return"Strong";return"Peak"; }
  function barClass(v){ return v<=3?"bar-red":(v<=6?"bar-amber":"bar-green"); }
  function subItems(sub){ return state.config.signals.filter(function(s){return s.sub===sub;}); }
  function titleCase(s){ return s? s.charAt(0).toUpperCase()+s.slice(1) : ""; }

  function lineChart(values){
    var W=320,H=112,padX=8,padTop=14,padBot=14,n=values.length;
    var vmin=Math.min.apply(Math,values),vmax=Math.max.apply(Math,values);
    var min=Math.max(0,Math.floor(vmin)-1),max=Math.min(10,Math.ceil(vmax)+1);
    if(max-min<4){max=Math.min(10,min+4);if(max-min<4)min=Math.max(0,max-4);}
    var x=function(i){return padX+(i/(n-1))*(W-padX*2);};
    var y=function(v){return padTop+(1-(v-min)/(max-min))*(H-padTop-padBot);};
    var pts=values.map(function(v,i){return[x(i),y(v)];});
    var line=pts.map(function(p,i){return(i?"L":"M")+p[0].toFixed(1)+" "+p[1].toFixed(1);}).join(" ");
    var area=line+" L"+x(n-1).toFixed(1)+" "+(H-padBot)+" L"+padX+" "+(H-padBot)+" Z";
    var dots=pts.map(function(p,i){var last=i===n-1;return '<circle cx="'+p[0].toFixed(1)+'" cy="'+p[1].toFixed(1)+'" r="'+(last?5:3)+'" fill="'+(last?"var(--blue-deep)":"#fff")+'" stroke="var(--blue-deep)" stroke-width="2"/>';}).join("");
    return '<svg class="chart" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none" style="height:112px"><defs><linearGradient id="lgp" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="var(--blue)" stop-opacity="0.28"/><stop offset="1" stop-color="var(--blue)" stop-opacity="0"/></linearGradient></defs><path d="'+area+'" fill="url(#lgp)"/><path d="'+line+'" fill="none" stroke="var(--blue-deep)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke"/>'+dots+'</svg>';
  }

  function postJSON(path, body){
    return fetch(FN+path,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)})
      .then(function(res){ return res.json().catch(function(){return {};}).then(function(j){ return {ok:res.ok,status:res.status,json:j}; }); });
  }

  function render(){
    if(!slug){ root().innerHTML='<div class="gatewrap"><div class="card feature lock-card"><div class="lock-title">Link incomplete</div><p class="lock-sub">Please open the exact link your coach gave you.</p></div></div>'; return; }
    if(view==="passcode") return renderPasscode();
    if(view==="checkin") return renderCheckin();
    if(view==="done") return renderDone();
    return renderHome();
  }

  function renderPasscode(){
    root().innerHTML =
      '<div class="gatewrap"><div class="card feature lock-card">'+
      '<div class="lock-badge"><svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="var(--blue-deep)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>'+
      '<h1 class="lock-title">'+esc(titleCase(slug))+'’s check-in</h1>'+
      '<p class="lock-sub">Enter your passcode to continue.</p>'+
      '<input id="pc" class="pc-input" type="text" inputmode="text" autocomplete="off" autocapitalize="characters" spellcheck="false" placeholder="Passcode" />'+
      (errMsg? '<p class="pc-err">'+esc(errMsg)+'</p>' : '')+
      '<button class="btn btn-primary full" data-action="enter"'+(busy?" disabled":"")+'>'+(busy?"Checking...":"Enter")+'</button>'+
      '</div></div>';
    var inp=document.getElementById("pc");
    if(inp){ inp.focus(); inp.addEventListener("keydown",function(e){ if(e.key==="Enter") doLoad(); }); }
  }

  function doLoad(){
    if(busy) return;
    var inp=document.getElementById("pc");
    var pc=inp? inp.value.trim() : "";
    if(!pc){ errMsg="Enter your passcode."; return render(); }
    busy=true; errMsg=""; render();
    postJSON("/assess-load",{slug:slug,passcode:pc}).then(function(r){
      busy=false;
      if(r.ok && r.json && r.json.token){
        state.token=r.json.token; state.name=r.json.name; state.config=r.json.config; state.responses=r.json.responses||[];
        view="home"; render();
      } else {
        errMsg = r.status===429 ? "Too many attempts. Please wait a few minutes." : ((r.json&&r.json.error)||"Invalid passcode");
        render();
      }
    }).catch(function(){ busy=false; errMsg="Network error. Please try again."; render(); });
  }

  function gateCardHTML(resp){
    var g=resp.scores.gate, gg=GATE[g]||GATE.amber;
    var h='<div class="card feature"><span class="gate '+g+'"><span class="d"></span>'+gg.t+'</span><p class="gate-note">'+gg.n+'</p>';
    state.config.subscales.forEach(function(s){
      var v=resp.scores.subscales[s.key]; if(v==null)v=0;
      h+='<div class="sub-row"><span class="sn">'+esc(s.label)+'</span><span class="sv">'+v.toFixed(1)+'<span style="color:var(--ink-faint);font-size:12px">/10</span></span><span class="track"><i class="'+barClass(v)+'" style="width:'+(v*10)+'%"></i></span></div>';
    });
    return h+'</div>';
  }

  function bySignalHTML(resp){
    var h='<div class="card"><div class="card-head"><span class="ct">All signals</span></div>';
    state.config.subscales.forEach(function(s){
      h+='<div class="group-label">'+esc(s.label)+'</div><div class="dom-list" style="margin-bottom:16px">';
      subItems(s.key).forEach(function(m){ var v=resp.answers[m.key]; if(v==null)v=0;
        h+='<div class="dom"><span class="dn">'+esc(m.label)+'</span><span class="dv">'+v+'<span style="color:var(--ink-faint);font-size:12px">/10</span></span><span class="track"><i style="width:'+(v*10)+'%"></i></span></div>'; });
      h+='</div>';
    });
    return h+'</div>';
  }

  function renderHome(){
    var due=isDue(), l=lastResp();
    var vals=state.responses.map(function(r){return r.scores.overall;});
    var now=vals.length?vals[vals.length-1]:0, first=vals.length?vals[0]:0, delta=now-first;
    var h='';
    h+='<header class="app-head"><div class="greet"><div class="kick">'+esc(state.config.title||"Check-in")+'</div><h1>'+greeting()+', '+esc(state.name)+'</h1></div><div class="avatar" aria-hidden="true">'+esc(state.config.initial||(state.name||"?").charAt(0))+'</div></header>';
    h+='<div class="stack">';
    h+='<div class="card feature pulse-hero"><div class="ph-top"><span class="tag '+(due?"due":"done")+'"><span class="d"></span>'+(due?"Check-in due":"This week done")+'</span><span class="streak"><span class="flame">'+state.responses.length+'</span>'+(state.responses.length===1?"week":"weeks")+'</span></div>';
    if(due){
      h+='<h2>This week&rsquo;s check-in is waiting.</h2><p>'+state.config.signals.length+' sliders, about two minutes. This is the rep that builds the trend and tells us when to go deeper.</p><button class="btn btn-primary full" data-action="start">Start check-in <span class="arrow">&rarr;</span></button>';
    } else {
      h+='<h2>You&rsquo;re checked in.</h2><p>This week&rsquo;s overall reading: <strong style="color:var(--ink)">'+now.toFixed(1)+'/10</strong>. Next check-in opens in '+(7-daysSince(l.submitted_at))+' days.</p><button class="btn btn-ghost full" data-action="start">Re-take this week</button>';
    }
    h+='</div>';
    if(l){
      h+='<div class="stat-row"><div class="stat"><div class="v">'+now.toFixed(1)+'<small>/10</small></div><div class="l">Overall</div></div><div class="stat"><div class="v">'+state.responses.length+'</div><div class="l">Weeks tracked</div></div><div class="stat"><div class="v">'+(delta>=0?"+":"")+delta.toFixed(1)+'</div><div class="l">Since start</div></div></div>';
      h+=gateCardHTML(l);
    }
    if(state.responses.length>=2){
      h+='<div class="card"><div class="card-head"><span class="ct">Overall trend</span></div><div class="trend-now"><div class="big">'+now.toFixed(1)+'<small>/10</small></div><span class="delta '+(delta>=0?"up":"down")+'">'+(delta>=0?"↑ +":"↓ ")+Math.abs(delta).toFixed(1)+' since W1</span></div>'+lineChart(vals)+'<div class="axis-row"><span>Week 1</span><span>This week</span></div></div>';
    }
    if(l){ h+=bySignalHTML(l); }
    if(state.responses.length===0){
      h+='<div class="card"><p class="screen-sub">Your first check-in sets the starting point. Each week builds the trend that shows when you are ready to take on more, even when part of you is afraid.</p></div>';
    }
    return void(root().innerHTML=h+'</div>');
  }

  function renderCheckin(){
    var sigs=state.config.signals, total=sigs.length, m=sigs[ciIndex], val=answers[m.key];
    var section=(state.config.subscales.filter(function(s){return s.key===m.sub;})[0]||{}).label||"";
    var h='<div class="screen"><div class="checkin-top"><button class="icon-btn" data-action="home" aria-label="Back"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button><div class="ci-progress"><i style="width:'+((ciIndex/total)*100)+'%"></i></div></div>';
    h+='<div class="card feature ci-card"><div class="slider-q"><div class="sq-section">'+esc(section)+'</div><div class="sq-num">Question '+(ciIndex+1)+' of '+total+'</div><h2>'+esc(m.q)+'</h2><p class="sq-help">'+esc(m.help||"")+'</p>';
    h+='<div class="val-display"><div class="vd-num" id="ciVal">'+val+'<small>/10</small></div><div class="vd-word" id="ciWord">'+wordFor(val)+'</div></div>';
    h+='<div class="range-wrap"><input type="range" min="0" max="10" step="1" value="'+val+'" class="brange" id="ciRange" style="--pct:'+(val*10)+'%"><div class="range-ends"><span>'+esc(m.lo||"")+'</span><span>'+esc(m.hi||"")+'</span></div></div>';
    h+='<div class="ci-nav">'+(ciIndex>0?'<button class="btn btn-ghost" data-action="prev">Back</button>':'')+'<button class="btn btn-primary" data-action="next"'+(busy?" disabled":"")+'>'+(busy?"Saving...":(ciIndex===total-1?"Finish":"Next"))+' <span class="arrow">&rarr;</span></button></div>';
    h+='</div></div></div>';
    root().innerHTML=h;
    var range=document.getElementById("ciRange");
    if(range){ range.addEventListener("input",function(){ var v=parseInt(range.value,10); answers[m.key]=v; range.style.setProperty("--pct",(v*10)+"%"); document.getElementById("ciVal").innerHTML=v+"<small>/10</small>"; document.getElementById("ciWord").textContent=wordFor(v); }); }
  }

  function renderDone(){
    var l=lastResp();
    var h='<div class="screen"><div class="card feature ci-card" style="margin-top:18px"><div class="ci-done"><div class="check"><svg viewBox="0 0 24 24" width="36" height="36" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></div><h2>Logged.</h2><p>Overall reading: <span class="pulse-num">'+l.scores.overall.toFixed(1)+'/10</span></p></div>';
    h+=gateCardHTML(l);
    h+='<button class="btn btn-primary full" data-action="home" style="margin-top:14px">Back to home</button>';
    root().innerHTML=h+'</div></div>';
  }

  function startCheckin(){ answers={}; state.config.signals.forEach(function(s){answers[s.key]=5;}); ciIndex=0; view="checkin"; render(); }
  function submitCheckin(){
    if(busy) return; busy=true; renderCheckin();
    postJSON("/assess-submit",{token:state.token,answers:answers}).then(function(r){
      busy=false;
      if(r.ok){ state.responses=r.json.responses||state.responses; view="done"; window.scrollTo({top:0}); render(); }
      else if(r.status===401){ errMsg="Your session timed out. Please re-enter your passcode."; view="passcode"; render(); }
      else { busy=false; alert("Could not save. Please try again."); renderCheckin(); }
    }).catch(function(){ busy=false; alert("Network error. Please try again."); renderCheckin(); });
  }

  root().addEventListener("click",function(e){
    var elx=e.target.closest("[data-action]"); if(!elx) return;
    var a=elx.getAttribute("data-action");
    if(a==="enter"){ doLoad(); }
    else if(a==="start"){ startCheckin(); }
    else if(a==="home"){ view="home"; window.scrollTo({top:0}); render(); }
    else if(a==="prev"){ ciIndex=Math.max(0,ciIndex-1); render(); }
    else if(a==="next"){ if(ciIndex===state.config.signals.length-1){ submitCheckin(); } else { ciIndex++; render(); } }
  });

  render();
})();
</script>
</body>
</html>
