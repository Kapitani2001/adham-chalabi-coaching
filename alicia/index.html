<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="robots" content="noindex, nofollow" />
<title>Charge Readiness · Alicia</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;0,6..72,700&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
:root{
  --cream:#F4EFE3;--ink:#1A1A1A;--ink-soft:#4C4843;--ink-faint:#8A857B;
  --blue:#4FC1E9;--blue-deep:#2BAEDE;--green:#3BB98C;
  --glass-bg:rgba(255,255,255,0.82);--glass-border:rgba(255,255,255,0.85);--glass-blur:14px;
  --radius:26px;--display:'Newsreader',Georgia,serif;--body:'Hanken Grotesk',system-ui,sans-serif;
  --shadow:0 22px 50px -22px rgba(26,26,26,0.20);--shadow-soft:0 10px 26px -14px rgba(26,26,26,0.16);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{font-family:var(--body);color:var(--ink);background:var(--cream);overflow-x:hidden;min-height:100vh;position:relative;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
.ambient{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
.blob{position:absolute;border-radius:50%;filter:blur(110px);opacity:0.5;}
.blob.b1{width:40vmax;height:40vmax;background:radial-gradient(circle at 30% 30%,#BFE9F7,transparent 72%);top:-18vmax;left:-14vmax;opacity:0.42;}
.blob.b2{width:38vmax;height:38vmax;background:radial-gradient(circle at 50% 50%,#FBE9A8,transparent 72%);bottom:-18vmax;right:-12vmax;opacity:0.45;}
.blob.b3{width:26vmax;height:26vmax;background:radial-gradient(circle at 50% 50%,#D8F2FB,transparent 72%);top:42%;right:14%;opacity:0.24;}
.app{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:22px 16px 40px;min-height:100vh;}
.app-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:16px;}
.greet{min-width:0;}
.greet .kick{font-weight:700;font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:var(--blue-deep);margin-bottom:3px;}
.greet h1{font-family:var(--display);font-weight:600;font-size:26px;line-height:1.05;letter-spacing:-0.01em;}
.avatar{width:44px;height:44px;border-radius:50%;flex:0 0 auto;background:linear-gradient(140deg,#6FD0EE,#2BAEDE);color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:600;font-size:18px;box-shadow:var(--shadow-soft);border:2px solid rgba(255,255,255,0.8);}
.stack{display:flex;flex-direction:column;gap:14px;}
.card{background:var(--glass-bg);backdrop-filter:blur(var(--glass-blur)) saturate(150%);-webkit-backdrop-filter:blur(var(--glass-blur)) saturate(150%);border:1px solid var(--glass-border);border-radius:var(--radius);box-shadow:var(--shadow-soft);padding:18px;position:relative;}
.card.feature{box-shadow:var(--shadow);}
.pulse-hero{overflow:hidden;}
.ph-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px;flex-wrap:wrap;}
.tag{display:inline-flex;align-items:center;gap:7px;font-weight:700;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;padding:6px 11px;border-radius:99px;}
.tag.due{background:rgba(243,210,78,0.30);color:#A9821B;}
.tag.done{background:rgba(59,185,140,0.18);color:#2A8A66;}
.tag .d{width:7px;height:7px;border-radius:50%;background:currentColor;}
.streak{display:flex;align-items:center;gap:8px;font-weight:700;font-size:13px;color:var(--ink-soft);white-space:nowrap;}
.streak .flame{width:26px;height:26px;border-radius:8px;background:rgba(243,210,78,0.35);display:flex;align-items:center;justify-content:center;color:#A9821B;font-weight:800;font-size:13px;}
.pulse-hero h2{font-family:var(--display);font-weight:600;font-size:24px;line-height:1.12;letter-spacing:-0.01em;margin-bottom:6px;}
.pulse-hero p{font-size:14px;line-height:1.5;color:var(--ink-soft);margin-bottom:16px;}
.btn{font-family:var(--body);font-weight:700;font-size:15px;border:none;cursor:pointer;border-radius:99px;padding:14px 20px;display:inline-flex;align-items:center;gap:9px;justify-content:center;transition:transform .15s ease,box-shadow .25s ease,background .2s;}
.btn-primary{background:var(--blue);color:#fff;box-shadow:0 10px 22px -8px rgba(43,174,222,0.7);}
.btn-primary:hover{background:var(--blue-deep);transform:translateY(-2px);}
.btn-ghost{background:rgba(255,255,255,0.6);color:var(--ink);border:1px solid var(--glass-border);}
.btn-ghost:hover{background:#fff;}
.btn.full{width:100%;}
.btn .arrow{transition:transform .2s;}.btn:hover .arrow{transform:translateX(3px);}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.stat{background:var(--glass-bg);border:1px solid var(--glass-border);border-radius:18px;padding:12px 8px;text-align:center;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);}
.stat .v{font-family:var(--display);font-weight:600;font-size:22px;line-height:1;white-space:nowrap;}
.stat .v small{font-size:12px;color:var(--ink-faint);}
.stat .l{font-size:11px;font-weight:600;color:var(--ink-faint);margin-top:6px;letter-spacing:0.02em;}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.card-head .ct{font-weight:700;font-size:13px;letter-spacing:0.06em;text-transform:uppercase;color:var(--ink-faint);}
.trend-now{display:flex;align-items:flex-end;justify-content:space-between;gap:10px;margin-bottom:4px;flex-wrap:wrap;}
.trend-now .big{font-family:var(--display);font-weight:600;font-size:32px;line-height:1;}
.trend-now .big small{font-size:15px;color:var(--ink-faint);}
.delta{font-weight:700;font-size:13px;display:inline-flex;align-items:center;gap:4px;padding:4px 9px;border-radius:99px;}
.delta.up{background:rgba(59,185,140,0.16);color:#2A8A66;}
.delta.down{background:rgba(201,138,30,0.16);color:#A9821B;}
.chart{width:100%;display:block;}
.axis-row{display:flex;justify-content:space-between;font-size:11px;font-weight:600;color:var(--ink-faint);margin-top:8px;padding:0 2px;}
.screen-sub{font-size:14px;color:var(--ink-soft);line-height:1.5;}
.dom-list{display:flex;flex-direction:column;gap:13px;}
.dom{display:grid;grid-template-columns:1fr auto;gap:4px 10px;align-items:center;}
.dom .dn{font-weight:600;font-size:14px;}
.dom .dv{font-family:var(--display);font-weight:600;font-size:15px;color:var(--ink-soft);font-variant-numeric:tabular-nums;}
.dom .track{grid-column:1/3;height:7px;border-radius:99px;background:rgba(26,26,26,0.08);overflow:hidden;}
.dom .track i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--blue),var(--blue-deep));}
.checkin-top{display:flex;align-items:center;gap:14px;margin-bottom:8px;}
.icon-btn{width:42px;height:42px;border-radius:50%;border:1px solid var(--glass-border);background:rgba(255,255,255,0.6);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink);flex:0 0 auto;}
.icon-btn:hover{background:#fff;}
.ci-progress{flex:1;height:7px;border-radius:99px;background:rgba(26,26,26,0.08);overflow:hidden;}
.ci-progress i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--blue),var(--blue-deep));transition:width .4s cubic-bezier(.22,1,.36,1);width:0;}
.ci-card{margin-top:18px;}
.slider-q{padding:6px 2px 2px;}
.slider-q .sq-num{font-weight:700;font-size:12px;letter-spacing:0.12em;text-transform:uppercase;color:var(--blue-deep);margin-bottom:10px;}
.slider-q h2{font-family:var(--display);font-weight:600;font-size:28px;line-height:1.12;letter-spacing:-0.02em;margin-bottom:8px;}
.slider-q .sq-help{font-size:14.5px;color:var(--ink-soft);line-height:1.5;margin-bottom:26px;}
.val-display{text-align:center;margin-bottom:6px;}
.val-display .vd-num{font-family:var(--display);font-weight:600;font-size:72px;line-height:1;letter-spacing:-0.03em;}
.val-display .vd-num small{font-size:26px;color:var(--ink-faint);}
.val-display .vd-word{font-weight:700;font-size:14px;color:var(--blue-deep);margin-top:2px;height:18px;}
.range-wrap{padding:10px 4px 4px;}
input[type=range].brange{-webkit-appearance:none;appearance:none;width:100%;height:10px;border-radius:99px;background:linear-gradient(90deg,var(--blue) 0%,var(--blue) var(--pct,50%),rgba(26,26,26,0.10) var(--pct,50%),rgba(26,26,26,0.10) 100%);outline:none;cursor:pointer;}
input[type=range].brange::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:34px;height:34px;border-radius:50%;background:#fff;border:3px solid var(--blue);box-shadow:0 6px 16px -4px rgba(43,174,222,0.7);cursor:grab;}
input[type=range].brange::-moz-range-thumb{width:34px;height:34px;border-radius:50%;background:#fff;border:3px solid var(--blue);box-shadow:0 6px 16px -4px rgba(43,174,222,0.7);cursor:grab;}
.range-ends{display:flex;justify-content:space-between;font-size:12px;font-weight:600;color:var(--ink-faint);margin-top:12px;padding:0 2px;}
.ci-nav{display:flex;gap:12px;margin-top:30px;}
.ci-nav .btn{flex:1;}
.ci-done{text-align:center;padding:10px 4px;}
.ci-done .check{width:74px;height:74px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;margin:6px auto 22px;box-shadow:0 14px 30px -10px rgba(59,185,140,0.7);}
.ci-done h2{font-family:var(--display);font-weight:600;font-size:32px;letter-spacing:-0.02em;margin-bottom:10px;}
.ci-done p{font-size:15px;line-height:1.55;color:var(--ink-soft);margin-bottom:6px;}
.ci-done .pulse-num{font-family:var(--display);font-weight:600;font-size:20px;color:var(--ink);}
.screen{animation:rise .45s cubic-bezier(.22,1,.36,1);}
@keyframes rise{from{transform:translateY(12px);opacity:.6;}to{transform:none;opacity:1;}}
@media (max-width:380px){.app{padding:18px 12px 32px;}.greet h1{font-size:24px;}.pulse-hero h2{font-size:22px;}.slider-q h2{font-size:25px;}}
</style>
</head>
<body>
<div class="ambient" aria-hidden="true"><div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div></div>
<main class="app" id="app"></main>
<script>
(function(){
  "use strict";
  var CLIENT={name:"Alicia",initial:"A"};
  var SIGNALS=[
    {key:"readiness",label:"Readiness",q:"How ready do you feel to take on the emotional charge of going into an anxious event?",help:"Readiness to enter the harder work, not whether the fear is gone.",lo:"Not ready",hi:"Fully ready"},
    {key:"confidence",label:"Confidence",q:"How confident are you that you could handle what surfaces?",help:"Belief that you can manage the feelings that come up.",lo:"Not at all",hi:"Completely"},
    {key:"courage",label:"Courage",q:"How willing do you feel to turn toward the fear rather than away?",help:"Willingness to approach the hard material instead of avoiding it.",lo:"Want to avoid",hi:"Ready to face it"},
    {key:"strength",label:"Strength",q:"If a big wave hit, how well could you stay with it without collapsing?",help:"Capacity to hold an intense charge in the moment.",lo:"Would collapse",hi:"Could hold it"},
    {key:"resilience",label:"Resilience",q:"When something stirred you up, how fast did you recover?",help:"Speed of recovery after an emotional hit.",lo:"Still carrying it",hi:"Recovered fast"}
  ];
  var STORE="compass_alicia_v1", DAY=864e5;
  var state=load(), view="home", ciIndex=0, answers={};

  function load(){try{var r=JSON.parse(localStorage.getItem(STORE));if(r&&r.entries)return r;}catch(e){}return{entries:[]};}
  function save(){try{localStorage.setItem(STORE,JSON.stringify(state));}catch(e){}}
  function avg(e){var s=0;SIGNALS.forEach(function(m){s+=e[m.key];});return s/SIGNALS.length;}
  function daysSince(ts){return Math.floor((Date.now()-ts)/DAY);}
  function lastEntry(){return state.entries[state.entries.length-1];}
  function isDue(){var l=lastEntry();return !l||daysSince(l.date)>=7;}
  function greeting(){var h=new Date().getHours();return h<12?"Morning":h<18?"Afternoon":"Evening";}
  function wordFor(v){if(v<=2)return"Very low";if(v<=4)return"Low";if(v===5)return"Middling";if(v<=7)return"Good";if(v<=9)return"Strong";return"Peak";}
  function bandNote(v){if(v<=3)return"Stay with safety and grounding this week. No charged work yet.";if(v<=6)return"Build the lowest signal with small reps. Ease toward the edges, no full deconstruction yet.";return"You are ready to approach a charged event, in paced doses.";}

  function lineChart(values){
    var W=320,H=112,padX=8,padTop=14,padBot=14,n=values.length;
    var vmin=Math.min.apply(Math,values),vmax=Math.max.apply(Math,values);
    var min=Math.max(0,Math.floor(vmin)-1),max=Math.min(10,Math.ceil(vmax)+1);
    if(max-min<4){max=Math.min(10,min+4);if(max-min<4)min=Math.max(0,max-4);}
    var x=function(i){return padX+(i/(n-1))*(W-padX*2);};
    var y=function(v){return padTop+(1-(v-min)/(max-min))*(H-padTop-padBot);};
    var pts=values.map(function(v,i){return[x(i),y(v)];});
    var line=pts.map(function(p,i){return(i?"L":"M")+p[0].toFixed(1)+" "+p[1].toFixed(1);}).join(" ");
    var area=line+" L"+x(n-1).toFixed(1)+" "+(H-padBot)+" L"+padX+" "+(H-padBot)+" Z";
    var dots=pts.map(function(p,i){var last=i===n-1;return '<circle cx="'+p[0].toFixed(1)+'" cy="'+p[1].toFixed(1)+'" r="'+(last?5:3)+'" fill="'+(last?"var(--blue-deep)":"#fff")+'" stroke="var(--blue-deep)" stroke-width="2"/>';}).join("");
    return '<svg class="chart" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none" style="height:112px">'+
      '<defs><linearGradient id="lgp" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="var(--blue)" stop-opacity="0.28"/><stop offset="1" stop-color="var(--blue)" stop-opacity="0"/></linearGradient></defs>'+
      '<path d="'+area+'" fill="url(#lgp)"/>'+
      '<path d="'+line+'" fill="none" stroke="var(--blue-deep)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke"/>'+dots+'</svg>';
  }

  function homeHTML(){
    var due=isDue(), l=lastEntry();
    var pulseVals=state.entries.map(avg);
    var now=pulseVals.length?pulseVals[pulseVals.length-1]:0;
    var first=pulseVals.length?pulseVals[0]:0;
    var delta=now-first;
    var h='';
    h+='<header class="app-head"><div class="greet"><div class="kick">Charge Readiness</div><h1>'+greeting()+', '+CLIENT.name+'</h1></div><div class="avatar" aria-hidden="true">'+CLIENT.initial+'</div></header>';
    h+='<div class="stack">';
    h+='<div class="card feature pulse-hero"><div class="ph-top"><span class="tag '+(due?"due":"done")+'"><span class="d"></span>'+(due?"Check-in due":"This week done")+'</span><span class="streak"><span class="flame">'+state.entries.length+'</span>'+(state.entries.length===1?"week":"weeks")+'</span></div>';
    if(due){
      h+='<h2>This week&rsquo;s pulse is waiting.</h2><p>Five honest sliders, about forty-five seconds. This is the rep that builds the trend.</p><button class="btn btn-primary full" data-action="start">Start check-in <span class="arrow">&rarr;</span></button>';
    }else{
      h+='<h2>You&rsquo;re checked in.</h2><p>This week&rsquo;s reading: <strong style="color:var(--ink)">'+now.toFixed(1)+'/10</strong>. Next check-in opens in '+(7-daysSince(l.date))+' days.</p><button class="btn btn-ghost full" data-action="start">Re-take this week</button>';
    }
    h+='</div>';
    if(state.entries.length>0){
      h+='<div class="stat-row"><div class="stat"><div class="v">'+now.toFixed(1)+'<small>/10</small></div><div class="l">Reading now</div></div><div class="stat"><div class="v">'+state.entries.length+'</div><div class="l">Weeks tracked</div></div><div class="stat"><div class="v">'+(delta>=0?"+":"")+delta.toFixed(1)+'</div><div class="l">Since start</div></div></div>';
    }
    if(state.entries.length>=2){
      h+='<div class="card"><div class="card-head"><span class="ct">Readiness trend</span></div><div class="trend-now"><div class="big">'+now.toFixed(1)+'<small>/10</small></div><span class="delta '+(delta>=0?"up":"down")+'">'+(delta>=0?"↑ +":"↓ ")+Math.abs(delta).toFixed(1)+' since W1</span></div>'+lineChart(pulseVals)+'<div class="axis-row"><span>Week 1</span><span>This week</span></div></div>';
    }
    if(l){
      h+='<div class="card"><div class="card-head"><span class="ct">Latest by signal</span></div><div class="dom-list">';
      SIGNALS.forEach(function(m){var v=l[m.key];h+='<div class="dom"><span class="dn">'+m.label+'</span><span class="dv">'+v+'<span style="color:var(--ink-faint);font-size:12px">/10</span></span><span class="track"><i style="width:'+(v*10)+'%"></i></span></div>';});
      h+='</div></div>';
    }
    if(state.entries.length===0){
      h+='<div class="card"><p class="screen-sub">Your first check-in sets the starting point. Each week after builds the trend that shows whether you are becoming ready to take on more, even when part of you is afraid.</p></div>';
    }
    h+='</div>';
    return h;
  }

  function checkinHTML(){
    var total=SIGNALS.length, m=SIGNALS[ciIndex], val=answers[m.key];
    var h='<div class="screen"><div class="checkin-top"><button class="icon-btn" data-action="home" aria-label="Back"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button><div class="ci-progress"><i style="width:'+((ciIndex/total)*100)+'%"></i></div></div>';
    h+='<div class="card feature ci-card"><div class="slider-q"><div class="sq-num">Signal '+(ciIndex+1)+' of '+total+'</div><h2>'+m.q+'</h2><p class="sq-help">'+m.help+'</p>';
    h+='<div class="val-display"><div class="vd-num" id="ciVal">'+val+'<small>/10</small></div><div class="vd-word" id="ciWord">'+wordFor(val)+'</div></div>';
    h+='<div class="range-wrap"><input type="range" min="0" max="10" step="1" value="'+val+'" class="brange" id="ciRange" style="--pct:'+(val*10)+'%"><div class="range-ends"><span>'+m.lo+'</span><span>'+m.hi+'</span></div></div>';
    h+='<div class="ci-nav">'+(ciIndex>0?'<button class="btn btn-ghost" data-action="prev">Back</button>':'')+'<button class="btn btn-primary" data-action="next">'+(ciIndex===total-1?"Finish":"Next")+' <span class="arrow">&rarr;</span></button></div>';
    h+='</div></div></div>';
    return h;
  }

  function doneHTML(){
    var l=lastEntry(), p=l?avg(l):0;
    return '<div class="screen"><div class="card feature ci-card" style="margin-top:18px"><div class="ci-done"><div class="check"><svg viewBox="0 0 24 24" width="36" height="36" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></div><h2>Logged.</h2><p>This week&rsquo;s reading: <span class="pulse-num">'+p.toFixed(1)+'/10</span></p><p style="margin-bottom:24px">'+bandNote(p)+'</p><button class="btn btn-primary full" data-action="home">Back to home</button></div></div></div>';
  }

  function render(){
    var root=document.getElementById("app");
    if(view==="checkin"){root.innerHTML=checkinHTML();wireRange();}
    else if(view==="done"){root.innerHTML=doneHTML();}
    else{root.innerHTML=homeHTML();}
    window.scrollTo({top:0});
  }

  function wireRange(){
    var range=document.getElementById("ciRange");
    if(!range)return;
    range.addEventListener("input",function(){
      var v=parseInt(range.value,10), m=SIGNALS[ciIndex];
      answers[m.key]=v;
      range.style.setProperty("--pct",(v*10)+"%");
      document.getElementById("ciVal").innerHTML=v+"<small>/10</small>";
      document.getElementById("ciWord").textContent=wordFor(v);
    });
  }

  function startCheckin(){
    answers={};SIGNALS.forEach(function(m){answers[m.key]=5;});
    ciIndex=0;view="checkin";render();
  }
  function finishCheckin(){
    var entry={date:Date.now()};SIGNALS.forEach(function(m){entry[m.key]=answers[m.key];});
    state.entries.push(entry);if(state.entries.length>12)state.entries=state.entries.slice(-12);
    save();view="done";render();
  }

  document.getElementById("app").addEventListener("click",function(e){
    var el=e.target.closest("[data-action]");if(!el)return;
    var a=el.getAttribute("data-action");
    if(a==="start"){startCheckin();}
    else if(a==="home"){view="home";render();}
    else if(a==="prev"){ciIndex=Math.max(0,ciIndex-1);render();}
    else if(a==="next"){if(ciIndex===SIGNALS.length-1){finishCheckin();}else{ciIndex++;render();}}
  });

  render();
})();
</script>
</body>
</html>
